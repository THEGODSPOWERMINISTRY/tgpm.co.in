<style>
body {
<div id="transition"></div>
  #transition {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  z-index: 9998;
  transform: scaleY(0);

  transition: 0.5s;
}
  <header>
  <nav class="navbar">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="sermons.html">Sermons</a>
    <a href="gallery.html">Gallery</a>
    <a href="prayer.html">Prayer</a>
    <a href="contact.html">Contact</a>
  </nav>
  <div id="loader">
  <h1>Loading...</h1>
</div>
  #loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  color: white;
  font-size: 30px;
}
</header>
  margin:0;
  font-family:'Poppins', sans-serif;
  color:white;
}

/* BACKGROUND VIDEO */
.bg-video {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
}

/* OVERLAY GRADIENT */
.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(45deg, rgba(0,0,0,0.8), rgba(0,0,50,0.7));
  z-index:-1;
}

/* CENTER CONTENT */
.container {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

/* MAIN GLASS BOX */
.box {
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);
  padding:50px;
  border-radius:20px;
  width:60%;
  box-shadow:0 0 40px rgba(0,0,0,0.5);
  animation:fadeIn 2s ease;
}

/* TITLE */
h1 {
  font-size:40px;
}

/* TEXT */
p {
  font-size:20px;
  line-height:1.6;
}

/* LEADERS */
.leaders {
  margin-top:30px;
}

.card {
  display:inline-block;
  background:rgba(255,255,255,0.15);
  padding:20px;
  margin:10px;
  border-radius:15px;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.1);
  background:rgba(255,255,255,0.3);
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}
</style>

</head>

<!-- VIDEO -->
<video autoplay muted loop class="bg-video">

</div>
