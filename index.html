<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGPM Ministry</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<!-- AOS -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<!-- PARTICLES -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  color:white;
  overflow-x:hidden;
}

/* NAVBAR */
header {
  position:fixed;
  width:100%;
  background:rgba(0,0,0,0.6);
  padding:15px;
  text-align:center;
  z-index:1000;
  backdrop-filter: blur(10px);
}
nav a {
  color:white;
  margin:15px;
  text-decoration:none;
}

/* LOADER */
#loader {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* TRANSITION */
#transition {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  z-index:9998;
  transform:scaleY(0);
  transform-origin:top;
  transition:0.5s;
}

/* PARTICLES */
#particles-js {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-3;
}

/* HERO */
.hero {
  height:100vh;
  position:relative;
}
.hero video {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}
.overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom, rgba(0,0,0,0.6), black);
}

/* TEXT */
.hero-text {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

/* TYPING */
.typing {
  font-size:55px;
  border-right:3px solid white;
  white-space:nowrap;
  overflow:hidden;
  width:0;
  animation:typing 4s steps(30,end) forwards, blink 0.7s infinite;
}

@keyframes typing {
  from {width:0;}
  to {width:100%;}
}
@keyframes blink {
  50% {border-color:transparent;}
}

.hero-text p {
  font-size:20px;
  margin-top:15px;
}

/* BUTTON */
.btn {
  margin-top:20px;
  padding:12px 25px;
  background:#F2A365;
  text-decoration:none;
  color:white;
  border-radius:5px;
}

/* SECTION */
.section {
  padding:100px 20px;
  text-align:center;
  background:#0a0a0a;
}

/* CARDS */
.cards {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}
.card {
  background:rgba(255,255,255,0.1);
  margin:15px;
  padding:30px;
  border-radius:15px;
  width:250px;
  transition:0.3s;
}
.card:hover {
  transform:translateY(-15px) scale(1.05);
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader"><h1>Loading...</h1></div>

<!-- TRANSITION -->
<div id="transition"></div>

<!-- PARTICLES -->
<div id="particles-js"></div>

<!-- NAVBAR -->
<header>
<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="sermons.html">Sermons</a>
<a href="gallery.html">Gallery</a>
<a href="prayer.html">Prayer</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<!-- HERO -->
<div class="hero">
<video autoplay muted loop>
<source src="videos/home.mp4">
</video>

<div class="overlay"></div>

<div class="hero-text">
<h1 class="typing">THE GOD'S POWER MINISTRY</h1>
<p>Jesus is the only God</p>
<a href="sermons.html" class="btn">Watch Sermons</a>
</div>
</div>

<!-- SECTION -->
<div class="section" data-aos="fade-up">
<h2>Our Ministry</h2>

<div class="cards">
<div class="card" data-aos="zoom-in">Healing Ministry</div>
<div class="card" data-aos="zoom-in">Prayer Meetings</div>
<div class="card" data-aos="zoom-in">Bible Teaching</div>
</div>

</div>

<!-- JS -->
<script>
/* LOADER */
window.addEventListener("load", function(){
  document.getElementById("loader").style.display = "none";
});

/* TRANSITION */
document.querySelectorAll("a").forEach(link => {
  link.addEventListener("click", function(e){
    if(this.href.includes(".html")){
      e.preventDefault();
      document.getElementById("transition").style.transform = "scaleY(1)";
      setTimeout(()=>{
        window.location = this.href;
      },500);
    }
  });
});

/* PARTICLES */
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    size: { value: 3 },
    move: { speed: 2 }
  }
});

/* AOS */
AOS.init();
</script>

</body>
</html>
