<!DOCTYPE html>
<html>
<head>
<title>TGPM Ministry</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  overflow-x:hidden;
  color:white;
}

/* NAVBAR */
header {
  position:fixed;
  width:100%;
  top:0;
  background:rgba(0,0,0,0.6);
  padding:15px;
  text-align:center;
  z-index:1000;
}
nav a {
  color:white;
  margin:15px;
  text-decoration:none;
}

/* HERO */
.hero {
  height:100vh;
  position:relative;
}

.hero video {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom, rgba(0,0,0,0.6), black);
}

/* TEXT */
.hero-text {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.hero-text h1 {
  font-size:60px;
}

.hero-text p {
  font-size:20px;
}

/* BUTTON */
.btn {
  margin-top:20px;
  padding:12px 25px;
  background:#F2A365;
  text-decoration:none;
  color:white;
  border-radius:5px;
}

/* SECTION */
.section {
  padding:80px 20px;
  text-align:center;
}

/* CARDS */
.cards {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card {
  background:rgba(255,255,255,0.1);
  margin:15px;
  padding:20px;
  border-radius:15px;
  width:250px;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-10px);
}
</style>

</head>
<body>

<header>
<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="sermons.html">Sermons</a>
<a href="gallery.html">Gallery</a>
<a href="prayer.html">Prayer</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<!-- HERO -->
<div class="hero">
<video autoplay muted loop>
<source src="videos/home.mp4">
</video>
<div class="overlay"></div>

<div class="hero-text">
<h1>THE GOD'S POWER MINISTRY</h1>
<p>Jesus is the only God</p>
<a href="sermons.html" class="btn">Watch Sermons</a>
</div>
</div>

<!-- SECTION -->
<div class="section">
<h2>Our Ministry</h2>

<div class="cards">
<div class="card">Healing Ministry</div>
<div class="card">Prayer Meetings</div>
<div class="card">Bible Teaching</div>
</div>
</div>

</body>
</html>
