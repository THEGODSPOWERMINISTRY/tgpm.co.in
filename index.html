<!DOCTYPE html>
<html>
<head>
<title>TGPM Ministry</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  <header>
  <nav class="navbar">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="sermons.html">Sermons</a>
    <a href="gallery.html">Gallery</a>
    <a href="prayer.html">Prayer</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>
  margin:0;
  font-family:'Poppins', sans-serif;
  overflow-x:hidden;
}

/* NAVBAR */
header {
  position:fixed;
  width:100%;
  top:0;
  background:rgba(0,0,0,0.6);
  padding:15px;
  text-align:center;
  z-index:1000;
}
nav a {
  color:white;
  margin:15px;
  text-decoration:none;
  font-size:18px;
}

/* VIDEO BACKGROUND */
.hero {
  height:100vh;
  position:relative;
}

.hero video {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* DARK OVERLAY */
.overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

/* TEXT CENTER */
.hero-text {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  color:white;
}

/* ANIMATED TEXT */
.hero-text h1 {
  font-size:70px;
  animation: fadeIn 2s ease-in-out;
}

.hero-text p {
  font-size:22px;
  margin-top:10px;
  animation: fadeIn 3s ease-in-out;
}

/* BUTTON */
.btn {
  margin-top:20px;
  padding:12px 25px;
  background:#F2A365;
  color:white;
  text-decoration:none;
  display:inline-block;
  border-radius:5px;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity:0; transform:translateY(30px);}
  to {opacity:1; transform:translateY(0);}
}
</style>

</head>
<body>

<header>
<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="sermons.html">Sermons</a>
<a href="gallery.html">Gallery</a>
<a href="prayer.html">Prayer</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<div class="hero">

  <!-- VIDEO -->
  <video autoplay muted loop>
    <source src="videos/home.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="hero-text">
    <h1>JESUS IS THE ONLY GOD</h1>
    <p>Nothing is impossible with Him</p>

    <a href="sermons.html">Watch Sermons</a>
  </div>

</div>

</body>
</html>
