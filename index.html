<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TGPM Ministry</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

  <!-- PARTICLES -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: white;
      overflow-x: hidden;
      background: black;
    }

    /* NAVBAR */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.6);
      padding: 15px;
      text-align: center;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }

    nav a {
      color: white;
      margin: 15px;
      text-decoration: none;
      font-weight: 500;
    }

    /* LOADER */
    #loader {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    /* TRANSITION */
    #transition {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 9998;
      transform: scaleY(0);
      transform-origin: top;
      transition: 0.5s;
      pointer-events: none;
    }

    /* PARTICLES */
    #particles-js {
      position: fixed;
      inset: 0;
      z-index: -30;
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 100px 20px 40px;
    }

    /* VIDEO */
    #bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -20;
      background: black;
    }

    /* OVERLAY */
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.45), rgba(0,0,0,0.85));
      z-index: -10;
    }

    /* TEXT */
    .hero-text {
      max-width: 900px;
      z-index: 2;
    }

    .typing {
      font-size: 55px;
      border-right: 3px solid white;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      margin: 0 auto;
      animation: typing 4s steps(30, end) forwards, blink 0.7s infinite;
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }

    .hero-text p {
      font-size: 20px;
      margin-top: 15px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #F2A365;
      text-decoration: none;
      color: white;
      border-radius: 5px;
      display: inline-block;
    }

    .section {
      padding: 100px 20px;
      text-align: center;
      background: #0a0a0a;
      position: relative;
      z-index: 1;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 15px;
      width: 250px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.03);
    }

    @media (max-width: 768px) {
      .typing {
        font-size: 28px;
        white-space: normal;
        width: auto;
        border-right: none;
        animation: none;
      }

      .hero-text p {
        font-size: 16px;
      }

      nav a {
        margin: 8px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

  <!-- LOADER -->
  <div id="loader"><h1>Loading...</h1></div>

  <!-- TRANSITION -->
  <div id="transition"></div>

  <!-- PARTICLES -->
  <div id="particles-js"></div>

  <!-- NAVBAR -->
  <header>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="sermons.html">Sermons</a>
      <a href="gallery.html">Gallery</a>
      <a href="prayer.html">Prayer</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero">
    <video id="bg-video" autoplay muted loop playsinline preload="auto">
      <source src="videos/home.mp4" type="video/mp4">
      Your browser does not support HTML5 video.
    </video>

    <div class="overlay"></div>

    <div class="hero-text">
      <h1 class="typing">THE GOD'S POWER MINISTRY</h1>
      <p>Jesus is the only God</p>
      <a href="sermons.html" class="btn">Watch Sermons</a>
    </div>
  </section>

  <!-- SECTION -->
  <section class="section" data-aos="fade-up">
    <h2>Our Ministry</h2>

    <div class="cards">
      <div class="card" data-aos="zoom-in">Healing Ministry</div>
      <div class="card" data-aos="zoom-in">Prayer Meetings</div>
      <div class="card" data-aos="zoom-in">Bible Teaching</div>
    </div>
  </section>

  <script>
    window.addEventListener("load", function () {
      document.getElementById("loader").style.display = "none";
    });

    const video = document.getElementById("bg-video");

    video.addEventListener("loadeddata", function () {
      console.log("Video loaded successfully");
    });

    video.addEventListener("error", function () {
      console.log("Video failed to load. Check path: videos/home.mp4");
      alert("Video not loading. Please check that home.mp4 is inside C:\\my-website\\videos\\");
    });

    video.play().catch(function (err) {
      console.log("Autoplay issue:", err);
    });

    document.querySelectorAll("a").forEach(link => {
      link.addEventListener("click", function (e) {
        const href = this.getAttribute("href");
        if (href && href.endsWith(".html")) {
          e.preventDefault();
          document.getElementById("transition").style.transform = "scaleY(1)";
          setTimeout(() => {
            window.location.href = href;
          }, 500);
        }
      });
    });

    particlesJS("particles-js", {
      particles: {
        number: { value: 80 },
        size: { value: 3 },
        move: { speed: 2 }
      }
    });

    AOS.init();
  </script>

</body>
</html>
