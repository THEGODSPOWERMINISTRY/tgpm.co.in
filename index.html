<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TGPM Ministry</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: white;
      overflow-x: hidden;
      background: black;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.6);
      padding: 15px;
      text-align: center;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }

    nav a {
      color: white;
      margin: 15px;
      text-decoration: none;
    }

    .hero {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    #bg-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(0,0,0,0.9));
      z-index: -1;
    }

    .hero-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 90%;
      max-width: 900px;
    }

    .hero-text h1 {
      font-size: 55px;
      margin: 0;
    }

    .hero-text p {
      font-size: 20px;
      margin-top: 15px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #F2A365;
      text-decoration: none;
      color: white;
      border-radius: 5px;
      display: inline-block;
    }

    .section {
      padding: 100px 20px;
      text-align: center;
      background: #0a0a0a;
      position: relative;
      z-index: 2;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 15px;
      width: 250px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.03);
    }

    @media (max-width: 768px) {
      .hero-text h1 {
        font-size: 32px;
      }

      .hero-text p {
        font-size: 16px;
      }

      nav a {
        margin: 8px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="sermons.html">Sermons</a>
      <a href="gallery.html">Gallery</a>
      <a href="prayers.html">Prayer</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <video id="bg-video" autoplay muted loop playsinline preload="auto">
      <source src="videos/home.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="hero-text">
      <h1>THE GOD'S POWER MINISTRY</h1>
      <p>Jesus is the only God</p>
      <a href="sermons.html" class="btn">Watch Sermons</a>
    </div>
  </section>

  <section class="section">
    <h2>Our Ministry</h2>
    <div class="cards">
      <div class="card">Healing Ministry</div>
      <div class="card">Prayer Meetings</div>
      <div class="card">Bible Teaching</div>
    </div>
  </section>

</body>
</html>
