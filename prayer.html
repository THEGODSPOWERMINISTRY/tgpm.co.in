<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prayer Request - TGPM</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: white;
      overflow-x: hidden;
      background: black;
    }

    /* NAVBAR */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.6);
      padding: 15px;
      text-align: center;
      z-index: 1000;
    }

    nav a {
      color: white;
      margin: 15px;
      text-decoration: none;
      transition: 0.3s;
    }

    nav a:hover {
      color: #F2A365;
    }

    /* LOADER */
    #loader {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    /* TRANSITION */
    #transition {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 9998;
      transform: scaleY(0);
      transform-origin: top;
      transition: transform 0.5s ease;
      pointer-events: none;
    }

    /* PARTICLES */
    #particles-js {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: -3;
    }

    /* VIDEO */
    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      background: black;
    }

    .overlay {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: -1;
    }

    /* CENTER */
    .container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 120px 20px 40px;
    }

    /* FORM */
    .form-box {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      width: 100%;
      max-width: 450px;
    }

    .form-box h2 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    input,
    textarea {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      background: #F2A365;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 8px;
      transition: 0.3s;
      font-family: 'Poppins', sans-serif;
    }

    button:hover {
      background: #e08e3c;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      nav a {
        margin: 8px;
        font-size: 14px;
      }

      .form-box {
        padding: 25px;
      }

      .form-box h2 {
        font-size: 26px;
      }
    }
  </style>
</head>

<body>

  <!-- LOADER -->
  <div id="loader"><h1>Loading...</h1></div>

  <!-- TRANSITION -->
  <div id="transition"></div>

  <!-- PARTICLES -->
  <div id="particles-js"></div>

  <!-- NAVBAR -->
  <header>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="sermons.html">Sermons</a>
      <a href="gallery.html">Gallery</a>
      <a href="prayer.html">Prayer</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <!-- VIDEO -->
  <video autoplay muted loop playsinline class="bg-video">
    <source src="videos/prayer.mp4" type="video/mp4" />
  </video>

  <div class="overlay"></div>

  <!-- FORM -->
  <div class="container">
    <div class="form-box">
      <h2>🙏 Prayer Request</h2>

      <form action="https://formsubmit.co/www.thegodspowerministry@gmail.com" method="POST">
        <input type="text" name="name" placeholder="Your Name" required />
        <input type="email" name="email" placeholder="Your Email" required />
        <input type="tel" name="phone" placeholder="Your Phone Number" required />
        <textarea name="message" rows="5" placeholder="Write your prayer request" required></textarea>

        <input type="hidden" name="_subject" value="New Prayer Request Received - TGPM" />
        <input type="hidden" name="_captcha" value="false" />
        <input type="hidden" name="_template" value="table" />
        <input type="hidden" name="_next" value="https://tgpm.co.in/thankyou.html" />

        <button type="submit">Submit Prayer Request</button>
      </form>
    </div>
  </div>

  <!-- JS -->
  <script>
    /* LOADER */
    window.addEventListener("load", function () {
      const loader = document.getElementById("loader");
      if (loader) {
        loader.style.display = "none";
      }
    });

    /* PAGE TRANSITION */
    document.querySelectorAll("a").forEach(function (link) {
      link.addEventListener("click", function (e) {
        const href = this.getAttribute("href");

        if (href && href.endsWith(".html")) {
          e.preventDefault();
          const transition = document.getElementById("transition");
          transition.style.transform = "scaleY(1)";

          setTimeout(() => {
            window.location.href = href;
          }, 500);
        }
      });
    });

    /* PARTICLES */
    if (window.particlesJS) {
      particlesJS("particles-js", {
        particles: {
          number: {
            value: 80,
            density: {
              enable: true,
              value_area: 800
            }
          },
          color: {
            value: "#ffffff"
          },
          shape: {
            type: "circle"
          },
          opacity: {
            value: 0.5
          },
          size: {
            value: 3,
            random: true
          },
          line_linked: {
            enable: true,
            distance: 150,
            color: "#ffffff",
            opacity: 0.3,
            width: 1
          },
          move: {
            enable: true,
            speed: 2
          }
        },
        interactivity: {
          detect_on: "canvas",
          events: {
            onhover: {
              enable: true,
              mode: "repulse"
            },
            onclick: {
              enable: true,
              mode: "push"
            },
            resize: true
          },
          modes: {
            repulse: {
              distance: 100
            },
            push: {
              particles_nb: 4
            }
          }
        },
        retina_detect: true
      });
    } else {
      console.log("particles.js not loaded");
    }
  </script>

</body>
</html>
