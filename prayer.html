<div class="container">
  <div class="form-box">

    <h2>🙏 Prayer Request</h2>

    <form id="prayerForm">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" rows="4" placeholder="Write your prayer request" required></textarea>
      <button type="submit">Submit</button>
    </form>

    <p id="msg">✅ Prayer submitted successfully</p>

  </div>
</div>

<script>
document.getElementById("prayerForm").addEventListener("submit", function(e){
  e.preventDefault();

  fetch("https://script.google.com/macros/s/AKfycbzL9WiD5ZPtHmzeEhX4FxejlLmaKgOWGklZWmf_CS_4msUWddiorG03YsBTRAuP7nMAWQ/exec", {
    method: "POST",
    body: new FormData(this)
  })
  .then(() => {
    document.getElementById("msg").style.display = "block";
    this.reset();
  })
  .catch(() => alert("Error"));
});
</script>
