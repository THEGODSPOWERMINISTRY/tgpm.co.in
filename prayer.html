<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prayer Request - TGPM</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  color: white;
}

/* NAVBAR */
header {
  position: fixed;
  width: 100%;
  background: rgba(0,0,0,0.6);
  padding: 15px;
  text-align: center;
  z-index: 1000;
}
nav a {
  color: white;
  margin: 15px;
  text-decoration: none;
}

/* LOADER */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

/* TRANSITION */
#transition {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  z-index: 9998;
  transform: scaleY(0);
  transform-origin: top;
  transition: 0.5s;
}

/* PARTICLES */
#particles-js {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -3;
}

/* VIDEO */
.bg-video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  z-index: -1;
}

/* CENTER */
.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* FORM */
.form-box {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding: 40px;
  border-radius: 15px;
  text-align: center;
  width: 400px;
}

.form-box h2 {
  font-size: 32px;
}

input, textarea {
  width: 100%;
  padding: 15px;
  margin: 10px 0;
  border: none;
  border-radius: 8px;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  background: #F2A365;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 8px;
}

button:hover {
  background: #e08e3c;
}

#msg {
  margin-top: 15px;
  display: none;
  color: lightgreen;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader"><h1>Loading...</h1></div>

<!-- TRANSITION -->
<div id="transition"></div>

<!-- PARTICLES -->
<div id="particles-js"></div>

<!-- NAVBAR -->
<header>
<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="sermons.html">Sermons</a>
<a href="gallery.html">Gallery</a>
<a href="prayer.html">Prayer</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<!-- VIDEO -->
<video autoplay muted loop class="bg-video">
  <source src="videos/prayer.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- FORM -->
<div class="container">
  <div class="form-box">

    <h2>🙏 Prayer Request</h2>

    <form id="prayerForm">
  <input type="text" name="name" placeholder="Your Name" required>

  <input type="email" name="email" placeholder="Your Email" required>

  <input type="tel" name="phone" placeholder="Your Phone Number" required>

  <textarea name="message" rows="4" placeholder="Write your prayer request" required></textarea>

  <button type="submit">Submit</button>
</form>

    <p id="msg">✅ Prayer submitted successfully</p>

  </div>
</div>

<!-- JS -->
<script>
/* LOADER */
window.addEventListener("load", function(){
  document.getElementById("loader").style.display = "none";
});

/* TRANSITION */
document.querySelectorAll("a").forEach(link => {
  link.addEventListener("click", function(e){
    if(this.href.includes(".html")){
      e.preventDefault();
      document.getElementById("transition").style.transform = "scaleY(1)";
      setTimeout(()=>{
        window.location = this.href;
      },500);
    }
  });
});

/* PARTICLES */
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    size: { value: 3 },
    move: { speed: 2 }
  }
});
document.getElementById("prayerForm").addEventListener("submit", function(e){
  e.preventDefault();

  fetch("https://script.google.com/macros/s/AKfycbyr6SHpr5IQwitOkvfynHCEzU-TTasuH3GwH3xwmtBWF4IeTV3QavHXsc3-kohb_X1lVw/exec", {
    method: "POST",
    body: new FormData(this)
  })
  .then(() => {
    alert("🙏 Prayer submitted successfully");
    this.reset();
  })
  .catch(() => alert("Error"));
});
/* GOOGLE SHEETS FORM */
document.getElementById("prayerForm").addEventListener("submit", function(e){
  e.preventDefault();

  fetch("https://script.google.com/macros/s/AKfycbyr6SHpr5IQwitOkvfynHCEzU-TTasuH3GwH3xwmtBWF4IeTV3QavHXsc3-kohb_X1lVw/exec", {
    method: "POST",
    body: new FormData(this)
  })
  .then(() => {
    document.getElementById("msg").style.display = "block";
    this.reset();
  })
  .catch(() => alert("Error submitting form"));
});
</script>

</body>
</html>
