<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sermons - TGPM</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#000;
  color:white;
}

/* NAVBAR */
header{
  position:fixed;
  width:100%;
  background:rgba(0,0,0,0.7);
  padding:15px;
  text-align:center;
}
nav a{
  color:white;
  margin:15px;
  text-decoration:none;
}

/* HERO */
.container{
  padding-top:100px;
  text-align:center;
}

/* SEARCH */
.search{
  margin:20px;
  padding:10px;
  width:80%;
  max-width:400px;
  border-radius:10px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:#111;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
}

.card p{
  padding:10px;
  font-size:14px;
}

/* MODAL VIDEO */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal iframe{
  width:90%;
  height:60%;
}
</style>
</head>

<body>

<header>
<nav>
<a href="index.html">Home</a>
<a href="sermons.html">Sermons</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<div class="container">
<h1>📖 Sermons</h1>

<input type="text" id="search" class="search" placeholder="Search sermons...">

<div id="videos" class="grid"></div>
</div>

<!-- VIDEO POPUP -->
<div id="modal" class="modal" onclick="closeVideo()">
  <iframe id="player" src="" frameborder="0" allowfullscreen></iframe>
</div>

<script>
const API_KEY = "YOUR_API_KEY";  // 🔥 PUT YOUR API KEY
const CHANNEL_ID = "YOUR_CHANNEL_ID"; // 🔥 PUT YOUR CHANNEL ID

let allVideos = [];

async function loadVideos(){
  let url = `https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=20`;

  let res = await fetch(url);
  let data = await res.json();

  allVideos = data.items;
  displayVideos(allVideos);
}

function displayVideos(videos){
  let container = document.getElementById("videos");
  container.innerHTML = "";

  videos.forEach(v=>{
    if(v.id.videoId){
      container.innerHTML += `
      <div class="card" onclick="playVideo('${v.id.videoId}')">
        <img src="${v.snippet.thumbnails.medium.url}">
        <p>${v.snippet.title}</p>
      </div>
      `;
    }
  });
}

function playVideo(id){
  document.getElementById("modal").style.display="flex";
  document.getElementById("player").src = "https://www.youtube.com/embed/"+id;
}

function closeVideo(){
  document.getElementById("modal").style.display="none";
  document.getElementById("player").src = "";
}

/* SEARCH */
document.getElementById("search").addEventListener("input", function(){
  let val = this.value.toLowerCase();

  let filtered = allVideos.filter(v =>
    v.snippet.title.toLowerCase().includes(val)
  );

  displayVideos(filtered);
});

loadVideos();
</script>

</body>
</html>
