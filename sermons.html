<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sermons - TGPM</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  color:white;
}

/* NAVBAR */
header {
  position:fixed;
  width:100%;
  background:rgba(0,0,0,0.6);
  padding:15px;
  text-align:center;
  z-index:1000;
}
nav a {
  color:white;
  margin:15px;
  text-decoration:none;
}

/* LOADER */
#loader {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* TRANSITION */
#transition {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  z-index:9998;
  transform:scaleY(0);
  transform-origin:top;
  transition:0.5s;
}

/* PARTICLES */
#particles-js {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-3;
}

/* VIDEO BACKGROUND */
.bg-video {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  z-index:-1;
}

/* CONTENT */
.container {
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  min-height:100vh;
  text-align:center;
  padding-top:120px;
}

/* 🔥 DAILY VERSE */
.daily-verse{
  margin:20px auto 30px;
  width:90%;
  max-width:900px;
  padding:18px 25px;
  border-radius:18px;
  background:linear-gradient(135deg,rgba(255,174,43,.25),rgba(255,255,255,.08));
  border:1px solid rgba(255,174,43,.7);
  box-shadow:0 0 30px rgba(255,174,43,.4);
  animation:verseGlow 1.8s infinite alternate;
}

.daily-verse span{
  color:#ffcc66;
  font-weight:800;
  font-size:18px;
}

.daily-verse p{
  color:#fff;
  font-size:clamp(17px,3vw,25px);
  font-weight:700;
}

@keyframes verseGlow{
  from{box-shadow:0 0 15px rgba(255,174,43,.25);}
  to{box-shadow:0 0 42px rgba(255,174,43,.75);}
}

/* BUTTON */
.btn {
  margin-top:20px;
  padding:15px 30px;
  font-size:18px;
  background:red;
  color:white;
  text-decoration:none;
  border-radius:30px;
  transition:0.3s;
}
.btn:hover {
  background:orange;
  transform:scale(1.05);
}

/* YOUTUBE CARD */
.youtube-card {
  margin-top:30px;
  width:90%;
  max-width:800px;
  min-height:280px;
  border-radius:18px;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.25);
  backdrop-filter:blur(14px);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:30px;
}

.youtube-btn {
  margin-top:20px;
  padding:15px 35px;
  background:#ff0000;
  color:white;
  text-decoration:none;
  border-radius:35px;
}
</style>
</head>

<body>

<div id="loader"><h1>Loading...</h1></div>
<div id="transition"></div>
<div id="particles-js"></div>

<header>
<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="sermons.html">Sermons</a>
<a href="gallery.html">Gallery</a>
<a href="prayer.html">Prayer</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<video autoplay muted loop class="bg-video">
  <source src="videos/sermon.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

  <!-- 🔥 DAILY VERSE -->
  <div class="daily-verse">
    <span>आज का वचन</span>
    <p id="dailyVerse">लोड हो रहा है...</p>
  </div>

  <h1>📖 Watch Our Sermons</h1>
  <p>Be blessed by the Word of God</p>

  <a href="https://www.youtube.com/@TheGodsPowerMinistrySD/videos" target="_blank" class="btn">
    ▶ Watch All Sermons on YouTube
  </a>

  <div class="youtube-card">
    <h2>Latest Sermons</h2>
    <a href="https://www.youtube.com/@TheGodsPowerMinistrySD/videos" target="_blank" class="youtube-btn">
      ▶ Open Sermons
    </a>
  </div>

</div>

<script>
/* LOADER */
window.addEventListener("load", function(){
  document.getElementById("loader").style.display = "none";
});

/* TRANSITION */
document.querySelectorAll("a").forEach(link => {
  link.addEventListener("click", function(e){
    if(this.href.includes(".html")){
      e.preventDefault();
      document.getElementById("transition").style.transform = "scaleY(1)";
      setTimeout(()=>{ window.location = this.href; },500);
    }
  });
});

/* PARTICLES */
particlesJS("particles-js", {
  particles:{ number:{value:80}, size:{value:3}, move:{speed:2} }
});

/* 🔥 FREE DAILY HINDI VERSE */
async function loadVerse(){
  try{
    let res = await fetch("https://beta.ourmanna.com/api/v1/get/?format=json");
    let data = await res.json();

    let verse = data.verse.details.text;
    let ref = data.verse.details.reference;

    let trans = await fetch(
      "https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=hi&dt=t&q=" +
      encodeURIComponent(verse)
    );

    let tdata = await trans.json();
    let hindi = tdata[0].map(v=>v[0]).join("");

    document.getElementById("dailyVerse").innerHTML =
      `"${hindi}"<br><strong>${ref}</strong>`;
  }catch{
    document.getElementById("dailyVerse").innerText = "आज का वचन उपलब्ध नहीं है";
  }
}

loadVerse();
</script>

</body>
</html>
