<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery - TGPM</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: white;
      background: #000;
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.65);
      padding: 15px 10px;
      text-align: center;
      z-index: 1000;
      backdrop-filter: blur(5px);
    }

    nav a {
      color: white;
      margin: 0 14px;
      text-decoration: none;
      font-size: 18px;
      transition: color 0.3s ease;
    }

    nav a:hover,
    nav a.active {
      color: #F2A365;
    }

    #loader {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    #loader.hide {
      opacity: 0;
      visibility: hidden;
    }

    #transition {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 9998;
      transform: scaleY(0);
      transform-origin: top;
      transition: transform 0.5s ease;
      pointer-events: none;
    }

    #particles-js {
      position: fixed;
      inset: 0;
      z-index: -3;
    }

    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      background: black;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      z-index: -1;
    }

    .main-content {
      position: relative;
      z-index: 1;
      padding-top: 110px;
      padding-bottom: 40px;
    }

    h1 {
      text-align: center;
      font-size: 46px;
      margin-bottom: 18px;
      padding: 0 20px;
    }

    .gallery-note {
      width: min(1200px, 92%);
      margin: 0 auto 28px auto;
      text-align: center;
      color: #d8d8d8;
      font-size: 15px;
    }

    .gallery {
      width: min(1200px, 92%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 22px;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      min-height: 260px;
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
    }

    .gallery-item img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      cursor: pointer;
      transition: transform 0.4s ease;
    }

    .gallery-item img:hover {
      transform: scale(1.05);
    }

    .fallback {
      display: none;
      width: 100%;
      height: 260px;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #bbb;
      font-size: 16px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.04);
    }

    #popup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      justify-content: center;
      align-items: center;
      z-index: 2000;
      padding: 20px;
    }

    #popup img {
      max-width: 92%;
      max-height: 85vh;
      width: auto;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.15);
    }

    #popup span {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 42px;
      cursor: pointer;
      color: white;
      line-height: 1;
      z-index: 2001;
    }

    @media (max-width: 768px) {
      nav a {
        margin: 0 8px;
        font-size: 14px;
      }

      h1 {
        font-size: 32px;
      }

      .gallery-item img,
      .fallback,
      .gallery-item {
        min-height: 220px;
        height: 220px;
      }

      #popup span {
        right: 18px;
        top: 16px;
        font-size: 34px;
      }
    }
  </style>
</head>

<body>
  <div id="loader"><h2>Loading...</h2></div>
  <div id="transition"></div>
  <div id="particles-js"></div>

  <header>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="sermons.html">Sermons</a>
      <a href="gallery.html" class="active">Gallery</a>
      <a href="prayer.html">Prayer</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <video autoplay muted loop playsinline class="bg-video" preload="metadata">
    <source src="videos/gallery.mp4" type="video/mp4" />
  </video>

  <div class="overlay"></div>

  <div class="main-content">
    <h1>Our Ministry Gallery</h1>
    <div class="gallery-note">Upload the exact image files to GitHub and keep the same folder name and filename.</div>

    <div class="gallery">
      <div class="gallery-item">
        <img src="images/gallery/img1.jpg" alt="Gallery Image 1" onclick="openImg(this.src)" loading="lazy">
        <div class="fallback">Image 1 not found</div>
      </div>

      <div class="gallery-item">
        <img src="images/gallery/img2.jpg" alt="Gallery Image 2" onclick="openImg(this.src)" loading="lazy">
        <div class="fallback">Image 2 not found</div>
      </div>

      <div class="gallery-item">
        <img src="images/gallery/img3.jpg" alt="Gallery Image 3" onclick="openImg(this.src)" loading="lazy">
        <div class="fallback">Image 3 not found</div>
      </div>

      <div class="gallery-item">
        <img src="images/gallery/img4.jpg" alt="Gallery Image 4" onclick="openImg(this.src)" loading="lazy">
        <div class="fallback">Image 4 not found</div>
      </div>

      <div class="gallery-item">
        <img src="images/gallery/img5.jpg" alt="Gallery Image 5" onclick="openImg(this.src)" loading="lazy">
        <div class="fallback">Image 5 not found</div>
      </div>
    </div>
  </div>

  <div id="popup">
    <span onclick="closeImg()">&times;</span>
    <img id="popupImg" alt="Popup Gallery Image">
  </div>

  <script>
    window.addEventListener("load", function () {
      document.getElementById("loader").classList.add("hide");
    });

    document.querySelectorAll("a").forEach(function (link) {
      link.addEventListener("click", function (e) {
        const href = this.getAttribute("href");
        if (href && href.endsWith(".html")) {
          e.preventDefault();
          document.getElementById("transition").style.transform = "scaleY(1)";
          setTimeout(function () {
            window.location.href = href;
          }, 500);
        }
      });
    });

    if (window.particlesJS) {
      particlesJS("particles-js", {
        particles: {
          number: {
            value: 40,
            density: {
              enable: true,
              value_area: 800
            }
          },
          color: {
            value: "#ffffff"
          },
          shape: {
            type: "circle"
          },
          opacity: {
            value: 0.35
          },
          size: {
            value: 2.5,
            random: true
          },
          line_linked: {
            enable: true,
            distance: 130,
            color: "#ffffff",
            opacity: 0.2,
            width: 1
          },
          move: {
            enable: true,
            speed: 1.2
          }
        },
        interactivity: {
          detect_on: "canvas",
          events: {
            onhover: {
              enable: true,
              mode: "repulse"
            },
            onclick: {
              enable: true,
              mode: "push"
            },
            resize: true
          }
        },
        retina_detect: true
      });
    }

    function openImg(src) {
      document.getElementById("popup").style.display = "flex";
      document.getElementById("popupImg").src = src;
      document.body.style.overflow = "hidden";
    }

    function closeImg() {
      document.getElementById("popup").style.display = "none";
      document.getElementById("popupImg").src = "";
      document.body.style.overflow = "auto";
    }

    document.getElementById("popup").addEventListener("click", function (e) {
      if (e.target.id === "popup") {
        closeImg();
      }
    });

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") {
        closeImg();
      }
    });

    document.querySelectorAll(".gallery-item img").forEach(function (img) {
      img.addEventListener("error", function () {
        img.style.display = "none";
        const fallback = img.nextElementSibling;
        if (fallback) {
          fallback.style.display = "flex";
        }
      });
    });
  </script>
</body>
</html>
