<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery - TGPM</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.75);
      padding: 15px 10px;
      text-align: center;
      z-index: 1000;
      backdrop-filter: blur(6px);
    }

    nav a {
      color: white;
      margin: 0 14px;
      text-decoration: none;
      font-size: 18px;
      transition: color 0.3s ease;
    }

    nav a:hover,
    nav a.active {
      color: #F2A365;
    }

    .main-content {
      width: min(1200px, 92%);
      margin: 0 auto;
      padding-top: 110px;
      padding-bottom: 50px;
    }

    h1 {
      text-align: center;
      font-size: 46px;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .subtext {
      text-align: center;
      color: #cfcfcf;
      margin-bottom: 30px;
      font-size: 15px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 22px;
    }

    .gallery-item {
      overflow: hidden;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      min-height: 260px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
    }

    .gallery-item img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      cursor: pointer;
      transition: transform 0.35s ease;
    }

    .gallery-item img:hover {
      transform: scale(1.05);
    }

    .status {
      text-align: center;
      padding: 30px 15px;
      color: #ccc;
      font-size: 16px;
    }

    #popup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.94);
      justify-content: center;
      align-items: center;
      z-index: 2000;
      padding: 20px;
    }

    #popup img {
      max-width: 92%;
      max-height: 85vh;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
    }

    #popup .close-btn {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 42px;
      color: white;
      cursor: pointer;
      line-height: 1;
    }

    @media (max-width: 768px) {
      nav a {
        margin: 0 8px;
        font-size: 14px;
      }

      h1 {
        font-size: 32px;
      }

      .gallery-item,
      .gallery-item img {
        min-height: 220px;
        height: 220px;
      }

      #popup .close-btn {
        right: 18px;
        top: 16px;
        font-size: 34px;
      }
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="sermons.html">Sermons</a>
      <a href="gallery.html" class="active">Gallery</a>
      <a href="prayer.html">Prayer</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <div class="main-content">
    <h1>Our Ministry Gallery</h1>
    <p class="subtext">Upload photos in <strong>images/gallery/</strong> and update <strong>images.json</strong></p>

    <div id="gallery" class="gallery"></div>
    <div id="status" class="status">Loading gallery...</div>
  </div>

  <div id="popup">
    <span class="close-btn" onclick="closeImg()">&times;</span>
    <img id="popupImg" alt="Popup Gallery Image" />
  </div>

  <script>
    async function loadGallery() {
      const gallery = document.getElementById("gallery");
      const status = document.getElementById("status");

      try {
        const response = await fetch("images.json");

        if (!response.ok) {
          throw new Error("images.json not found");
        }

        const images = await response.json();

        if (!Array.isArray(images) || images.length === 0) {
          status.textContent = "No images found in gallery.";
          return;
        }

        gallery.innerHTML = "";
        let visibleImages = 0;

        images.forEach((fileName) => {
          const item = document.createElement("div");
          item.className = "gallery-item";

          const img = document.createElement("img");
          img.src = "images/gallery/" + fileName;
          img.alt = fileName;
          img.loading = "lazy";

          img.addEventListener("click", function () {
            openImg(img.src);
          });

          img.addEventListener("load", function () {
            visibleImages++;
            status.style.display = "none";
          });

          img.addEventListener("error", function () {
            item.remove();
            if (visibleImages === 0 && gallery.children.length === 0) {
              status.textContent = "Images could not be loaded. Please check image names and folder path.";
            }
          });

          item.appendChild(img);
          gallery.appendChild(item);
        });
      } catch (error) {
        status.textContent = "Unable to load gallery. Please check images.json.";
      }
    }

    function openImg(src) {
      document.getElementById("popup").style.display = "flex";
      document.getElementById("popupImg").src = src;
      document.body.style.overflow = "hidden";
    }

    function closeImg() {
      document.getElementById("popup").style.display = "none";
      document.getElementById("popupImg").src = "";
      document.body.style.overflow = "auto";
    }

    document.getElementById("popup").addEventListener("click", function (e) {
      if (e.target.id === "popup") {
        closeImg();
      }
    });

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") {
        closeImg();
      }
    });

    loadGallery();
  </script>

</body>
</html>
