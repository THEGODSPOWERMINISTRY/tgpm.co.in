<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Church Gallery</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0f2027;
  color: white;
}

/* Header */
header {
  text-align: center;
  padding: 30px;
  background: linear-gradient(to right, #203a43, #2c5364);
}

header h1 {
  margin: 0;
  font-size: 36px;
}

/* Gallery Grid */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 30px;
}

/* Image Card */
.card {
  overflow: hidden;
  border-radius: 15px;
  position: relative;
}

.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  transition: 0.4s;
}

/* Hover Effect */
.card:hover img {
  transform: scale(1.1);
}

/* Overlay */
.overlay {
  position: absolute;
  bottom: 0;
  background: rgba(0,0,0,0.6);
  width: 100%;
  padding: 10px;
  text-align: center;
  opacity: 0;
  transition: 0.3s;
}

.card:hover .overlay {
  opacity: 1;
}

/* Lightbox */
.lightbox {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

.lightbox img {
  max-width: 90%;
  max-height: 80%;
  border-radius: 10px;
}

.lightbox:target {
  display: flex;
}
</style>

</head>

<body>

<header>
  <h1>📸 Church Gallery</h1>
  <p>Moments from Worship, Events & Fellowship</p>
</header>

<div class="gallery">

  <a href="#img1" class="card">
    <img src="images/photo1.jpg">
    <div class="overlay">Sunday Service</div>
  </a>

  <a href="#img2" class="card">
    <img src="images/photo2.jpg">
    <div class="overlay">Prayer Meeting</div>
  </a>

  <a href="#img3" class="card">
    <img src="images/photo3.jpg">
    <div class="overlay">Church Event</div>
  </a>

</div>

<!-- Lightbox Images -->
<div id="img1" class="lightbox">
  <a href="#"><img src="images/photo1.jpg"></a>
</div>

<div id="img2" class="lightbox">
  <a href="#"><img src="images/photo2.jpg"></a>
</div>

<div id="img3" class="lightbox">
  <a href="#"><img src="images/photo3.jpg"></a>
</div>

</body>
</html>
