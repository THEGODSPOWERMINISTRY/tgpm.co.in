<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery - TGPM</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: white;
      overflow-x: hidden;
      background: #000;
    }

    /* NAVBAR */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.65);
      padding: 15px 10px;
      text-align: center;
      z-index: 1000;
      backdrop-filter: blur(6px);
    }

    nav a {
      color: white;
      margin: 0 14px;
      text-decoration: none;
      font-size: 18px;
      transition: color 0.3s ease;
    }

    nav a:hover,
    nav a.active {
      color: #F2A365;
    }

    /* LOADER */
    #loader {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    #loader.hide {
      opacity: 0;
      visibility: hidden;
    }

    .loader-text {
      font-size: 28px;
      font-weight: 600;
      color: white;
    }

    /* TRANSITION */
    #transition {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 9998;
      transform: scaleY(0);
      transform-origin: top;
      transition: transform 0.5s ease;
      pointer-events: none;
    }

    /* PARTICLES */
    #particles-js {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: -3;
    }

    /* VIDEO */
    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      background: black;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      z-index: -1;
    }

    /* MAIN CONTENT */
    .main-content {
      position: relative;
      z-index: 1;
      padding-top: 110px;
      padding-bottom: 40px;
    }

    h1 {
      text-align: center;
      font-size: 46px;
      margin-bottom: 30px;
      padding: 0 20px;
    }

    /* GRID */
    .gallery {
      width: min(1200px, 92%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 22px;
    }

    /* IMAGE CARD */
    .gallery-item {
      overflow: hidden;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
    }

    .gallery img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      cursor: pointer;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    /* POPUP */
    #popup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      justify-content: center;
      align-items: center;
      z-index: 2000;
      padding: 20px;
    }

    #popup img {
      max-width: 92%;
      max-height: 85vh;
      width: auto;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.15);
    }

    #popup span {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 42px;
      cursor: pointer;
      color: white;
      line-height: 1;
      z-index: 2001;
    }

    /* FALLBACK MESSAGE */
    .gallery-note {
      width: min(1200px, 92%);
      margin: 0 auto 25px auto;
      text-align: center;
      color: #ddd;
      font-size: 15px;
    }

    @media (max-width: 768px) {
      nav a {
        margin: 0 8px;
        font-size: 14px;
      }

      h1 {
        font-size: 32px;
        margin-bottom: 22px;
      }

      .gallery {
        gap: 16px;
      }

      .gallery img {
        height: 220px;
      }

      #popup span {
        right: 18px;
        top: 16px;
        font-size: 34px;
      }

      .loader-text {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

  <!-- LOADER -->
  <div id="loader">
    <div class="loader-text">Loading...</div>
  </div>

  <!-- PAGE TRANSITION -->
  <div id="transition"></div>

  <!-- PARTICLES -->
  <div id="particles-js"></div>

  <!-- NAVBAR -->
  <header>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="sermons.html">Sermons</a>
      <a href="gallery.html" class="active">Gallery</a>
      <a href="prayer.html">Prayer</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <!-- BACKGROUND VIDEO -->
  <video autoplay muted loop playsinline class="bg-video" preload="metadata">
    <source src="videos/gallery.mp4" type="video/mp4" />
  </video>

  <div class="overlay"></div>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <h1>Our Ministry Gallery</h1>
    <div class="gallery-note">
      Make sure your image files are uploaded in the correct folder path.
    </div>

    <div class="gallery">
      <div class="gallery-item">
        <img src="images/img1.jpg" alt="Gallery Image 1" onclick="openImg(this.src)" loading="lazy" />
      </div>
      <div class="gallery-item">
        <img src="images/img2.jpg" alt="Gallery Image 2" onclick="openImg(this.src)" loading="lazy" />
      </div>
      <div class="gallery-item">
        <img src="images/img3.jpg" alt="Gallery Image 3" onclick="openImg(this.src)" loading="lazy" />
      </div>
      <div class="gallery-item">
        <img src="images/img4.jpg" alt="Gallery Image 4" onclick="openImg(this.src)" loading="lazy" />
      </div>
      <div class="gallery-item">
        <img src="images/img5.jpg" alt="Gallery Image 5" onclick="openImg(this.src)" loading="lazy" />
      </div>
    </div>
  </div>

  <!-- POPUP -->
  <div id="popup">
    <span onclick="closeImg()">&times;</span>
    <img id="popupImg" alt="Popup Gallery Image" />
  </div>

  <script>
    /* LOADER */
    window.addEventListener("load", function () {
      const loader = document.getElementById("loader");
      setTimeout(function () {
        loader.classList.add("hide");
      }, 300);
    });

    /* PAGE TRANSITION */
    document.querySelectorAll("a").forEach(function (link) {
      link.addEventListener("click", function (e) {
        const href = this.getAttribute("href");

        if (
          href &&
          href.endsWith(".html") &&
          !href.startsWith("#") &&
          !this.hasAttribute("target")
        ) {
          e.preventDefault();
          document.getElementById("transition").style.transform = "scaleY(1)";
          setTimeout(function () {
            window.location.href = href;
          }, 500);
        }
      });
    });

    /* PARTICLES */
    if (window.particlesJS) {
      particlesJS("particles-js", {
        particles: {
          number: {
            value: 50,
            density: {
              enable: true,
              value_area: 800
            }
          },
          color: {
            value: "#ffffff"
          },
          shape: {
            type: "circle"
          },
          opacity: {
            value: 0.35
          },
          size: {
            value: 2.5,
            random: true
          },
          line_linked: {
            enable: true,
            distance: 130,
            color: "#ffffff",
            opacity: 0.2,
            width: 1
          },
          move: {
            enable: true,
            speed: 1.4
          }
        },
        interactivity: {
          detect_on: "canvas",
          events: {
            onhover: {
              enable: true,
              mode: "repulse"
            },
            onclick: {
              enable: true,
              mode: "push"
            },
            resize: true
          },
          modes: {
            repulse: {
              distance: 80
            },
            push: {
              particles_nb: 3
            }
          }
        },
        retina_detect: true
      });
    }

    /* IMAGE POPUP */
    function openImg(src) {
      document.getElementById("popup").style.display = "flex";
      document.getElementById("popupImg").src = src;
      document.body.style.overflow = "hidden";
    }

    function closeImg() {
      document.getElementById("popup").style.display = "none";
      document.getElementById("popupImg").src = "";
      document.body.style.overflow = "auto";
    }

    /* CLOSE POPUP WHEN CLICKING OUTSIDE IMAGE */
    document.getElementById("popup").addEventListener("click", function (e) {
      if (e.target.id === "popup") {
        closeImg();
      }
    });

    /* ESC KEY CLOSE */
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") {
        closeImg();
      }
    });

    /* IMAGE ERROR HANDLING */
    document.querySelectorAll(".gallery img").forEach(function(img) {
      img.addEventListener("error", function() {
        this.alt = "Image not found";
        this.style.opacity = "0.5";
      });
    });
  </script>

</body>
</html>
