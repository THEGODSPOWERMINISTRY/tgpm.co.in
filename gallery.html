<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery - TGPM</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: white;
      overflow-x: hidden;
      background: black;
    }

    /* NAVBAR */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.6);
      padding: 15px;
      text-align: center;
      z-index: 1000;
    }

    nav a {
      color: white;
      margin: 15px;
      text-decoration: none;
      font-size: 18px;
      transition: 0.3s;
    }

    nav a:hover {
      color: #F2A365;
    }

    /* LOADER */
    #loader {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    /* TRANSITION */
    #transition {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 9998;
      transform: scaleY(0);
      transform-origin: top;
      transition: transform 0.5s ease;
      pointer-events: none;
    }

    /* PARTICLES */
    #particles-js {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: -3;
    }

    /* VIDEO */
    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      background: black;
    }

    .overlay {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: -1;
    }

    /* TITLE */
    h1 {
      text-align: center;
      padding-top: 100px;
      font-size: 40px;
      margin-bottom: 10px;
    }

    /* GRID */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    /* IMAGE */
    .gallery img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.4s;
      display: block;
    }

    .gallery img:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #fff;
    }

    /* POPUP */
    #popup {
      display: none;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      justify-content: center;
      align-items: center;
      z-index: 2000;
      padding: 20px;
    }

    #popup img {
      max-width: 90%;
      max-height: 85vh;
      width: auto;
      height: auto;
      border-radius: 10px;
    }

    #popup span {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      cursor: pointer;
      color: white;
    }

    @media (max-width: 768px) {
      nav a {
        margin: 8px;
        font-size: 14px;
      }

      h1 {
        font-size: 30px;
        padding-top: 90px;
      }

      .gallery {
        padding: 20px;
        gap: 15px;
      }

      .gallery img {
        height: 220px;
      }

      #popup span {
        right: 20px;
        font-size: 34px;
      }
    }
  </style>
</head>

<body>

  <!-- LOADER -->
  <div id="loader">
    <h1>Loading...</h1>
  </div>

  <!-- TRANSITION -->
  <div id="transition"></div>

  <!-- PARTICLES -->
  <div id="particles-js"></div>

  <!-- NAVBAR -->
  <header>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="sermons.html">Sermons</a>
      <a href="gallery.html">Gallery</a>
      <a href="prayer.html">Prayer</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <!-- VIDEO -->
  <video autoplay muted loop playsinline class="bg-video">
    <source src="videos/gallery.mp4" type="video/mp4" />
  </video>

  <div class="overlay"></div>

  <h1>Our Ministry Gallery</h1>

  <!-- IMAGES -->
  <div class="gallery">
    <img src="images/img1.jpg" alt="Gallery Image 1" onclick="openImg(this.src)" />
<img src="images/img2.jpg" alt="Gallery Image 2" onclick="openImg(this.src)" />
<img src="images/img3.jpg" alt="Gallery Image 3" onclick="openImg(this.src)" />
<img src="images/img4.jpg" alt="Gallery Image 4" onclick="openImg(this.src)" />
<img src="images/img5.jpg" alt="Gallery Image 5" onclick="openImg(this.src)" />
  </div>

  <!-- POPUP -->
  <div id="popup" onclick="closeImg()">
    <span>&times;</span>
    <img id="popupImg" alt="Popup Gallery Image" />
  </div>

  <!-- JS -->
  <script>
    /* LOADER */
    window.addEventListener("load", function () {
      const loader = document.getElementById("loader");
      if (loader) {
        loader.style.display = "none";
      }
    });

    /* TRANSITION */
    document.querySelectorAll("a").forEach(function (link) {
      link.addEventListener("click", function (e) {
        const href = this.getAttribute("href");

        if (href && href.endsWith(".html")) {
          e.preventDefault();
          document.getElementById("transition").style.transform = "scaleY(1)";
          setTimeout(function () {
            window.location.href = href;
          }, 500);
        }
      });
    });

    /* PARTICLES */
    if (window.particlesJS) {
      particlesJS("particles-js", {
        particles: {
          number: {
            value: 80,
            density: {
              enable: true,
              value_area: 800
            }
          },
          color: {
            value: "#ffffff"
          },
          shape: {
            type: "circle"
          },
          opacity: {
            value: 0.5
          },
          size: {
            value: 3,
            random: true
          },
          line_linked: {
            enable: true,
            distance: 150,
            color: "#ffffff",
            opacity: 0.3,
            width: 1
          },
          move: {
            enable: true,
            speed: 2
          }
        },
        interactivity: {
          detect_on: "canvas",
          events: {
            onhover: {
              enable: true,
              mode: "repulse"
            },
            onclick: {
              enable: true,
              mode: "push"
            },
            resize: true
          },
          modes: {
            repulse: {
              distance: 100
            },
            push: {
              particles_nb: 4
            }
          }
        },
        retina_detect: true
      });
    }

    /* IMAGE POPUP */
    function openImg(src) {
      document.getElementById("popup").style.display = "flex";
      document.getElementById("popupImg").src = src;
    }

    function closeImg() {
      document.getElementById("popup").style.display = "none";
    }
  </script>

</body>
</html>
