<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery - TGPM</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: white;
      background: black;
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.65);
      padding: 15px 10px;
      text-align: center;
      z-index: 1000;
    }

    nav a {
      color: white;
      margin: 0 12px;
      text-decoration: none;
      font-size: 18px;
      transition: 0.3s;
    }

    nav a:hover,
    nav a.active {
      color: #F2A365;
    }

    #loader {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #transition {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 9998;
      transform: scaleY(0);
      transform-origin: top;
      transition: transform 0.5s ease;
      pointer-events: none;
    }

    #particles-js {
      position: fixed;
      inset: 0;
      z-index: -3;
    }

    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      z-index: -1;
    }

    .main-content {
      padding-top: 110px;
      padding-bottom: 40px;
      position: relative;
      z-index: 1;
    }

    h1 {
      text-align: center;
      font-size: 42px;
      margin-bottom: 15px;
      padding: 0 20px;
    }

    .note {
      text-align: center;
      color: #ddd;
      margin-bottom: 30px;
      font-size: 14px;
      padding: 0 20px;
    }

    .gallery {
      width: min(1200px, 92%);
      margin: auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .gallery-item {
      border-radius: 14px;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
    }

    .gallery img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      display: block;
      cursor: pointer;
      transition: transform 0.4s ease;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    #popup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      justify-content: center;
      align-items: center;
      z-index: 2000;
      padding: 20px;
    }

    #popup img {
      max-width: 92%;
      max-height: 85vh;
      border-radius: 10px;
    }

    #popup span {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      color: white;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      nav a {
        margin: 0 8px;
        font-size: 14px;
      }

      h1 {
        font-size: 30px;
      }

      .gallery img {
        height: 220px;
      }
    }
  </style>
</head>
<body>

  <div id="loader"><h2>Loading...</h2></div>
  <div id="transition"></div>
  <div id="particles-js"></div>

  <header>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="sermons.html">Sermons</a>
      <a href="gallery.html" class="active">Gallery</a>
      <a href="prayer.html">Prayer</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <video autoplay muted loop playsinline class="bg-video" preload="metadata">
    <source src="videos/gallery.mp4" type="video/mp4" />
  </video>

  <div class="overlay"></div>

  <div class="main-content">
    <h1>Our Ministry Gallery</h1>
    <div class="note">Upload your images to the correct GitHub folder and keep the exact same filename.</div>

    <div class="gallery">
      <div class="gallery-item">
        <img src="images/gallery/img1.jpg" alt="Gallery Image 1" onclick="openImg(this.src)" loading="lazy">
      </div>
      <div class="gallery-item">
        <img src="images/gallery/img2.jpg" alt="Gallery Image 2" onclick="openImg(this.src)" loading="lazy">
      </div>
      <div class="gallery-item">
        <img src="images/gallery/img3.jpg" alt="Gallery Image 3" onclick="openImg(this.src)" loading="lazy">
      </div>
      <div class="gallery-item">
        <img src="images/gallery/img4.jpg" alt="Gallery Image 4" onclick="openImg(this.src)" loading="lazy">
      </div>
      <div class="gallery-item">
        <img src="images/gallery/img5.jpg" alt="Gallery Image 5" onclick="openImg(this.src)" loading="lazy">
      </div>
    </div>
  </div>

  <div id="popup">
    <span onclick="closeImg()">&times;</span>
    <img id="popupImg" alt="Popup Gallery Image">
  </div>

  <script>
    window.addEventListener("load", function () {
      document.getElementById("loader").style.display = "none";
    });

    document.querySelectorAll("a").forEach(function (link) {
      link.addEventListener("click", function (e) {
        const href = this.getAttribute("href");
        if (href && href.endsWith(".html")) {
          e.preventDefault();
          document.getElementById("transition").style.transform = "scaleY(1)";
          setTimeout(function () {
            window.location.href = href;
          }, 500);
        }
      });
    });

    if (window.particlesJS) {
      particlesJS("particles-js", {
        particles: {
          number: { value: 40, density: { enable: true, value_area: 800 } },
          color: { value: "#ffffff" },
          shape: { type: "circle" },
          opacity: { value: 0.35 },
          size: { value: 2.5, random: true },
          line_linked: {
            enable: true,
            distance: 130,
            color: "#ffffff",
            opacity: 0.2,
            width: 1
          },
          move: { enable: true, speed: 1.2 }
        },
        interactivity: {
          detect_on: "canvas",
          events: {
            onhover: { enable: true, mode: "repulse" },
            onclick: { enable: true, mode: "push" },
            resize: true
          }
        },
        retina_detect: true
      });
    }

    function openImg(src) {
      document.getElementById("popup").style.display = "flex";
      document.getElementById("popupImg").src = src;
      document.body.style.overflow = "hidden";
    }

    function closeImg() {
      document.getElementById("popup").style.display = "none";
      document.getElementById("popupImg").src = "";
      document.body.style.overflow = "auto";
    }

    document.getElementById("popup").addEventListener("click", function (e) {
      if (e.target.id === "popup") {
        closeImg();
      }
    });

    document.querySelectorAll(".gallery img").forEach(function(img) {
      img.addEventListener("error", function() {
        this.style.opacity = "0.4";
        this.alt = "Image not found";
      });
    });
  </script>

</body>
</html>
