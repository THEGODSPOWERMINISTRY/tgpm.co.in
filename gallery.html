<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - TGPM</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  color:white;
}

/* NAVBAR */
header {
  position:fixed;
  top:0;
  width:100%;
  background:rgba(0,0,0,0.6);
  padding:15px;
  text-align:center;
  z-index:1000;
}

nav a {
  color:white;
  margin:15px;
  text-decoration:none;
  font-size:18px;
}

/* LOADER */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* TRANSITION */
#transition {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  z-index: 9998;
  transform: scaleY(0);
  transform-origin: top;
  transition: 0.5s;
}

/* PARTICLES */
#particles-js {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-3;
}

/* VIDEO */
.bg-video {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  z-index:-1;
}

/* TITLE */
h1 {
  text-align:center;
  padding-top:90px;
  font-size:40px;
}

/* GRID */
.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
  gap:20px;
  padding:40px;
}

/* IMAGE */
.gallery img {
  width:100%;
  border-radius:15px;
  cursor:pointer;
  transition:0.4s;
}

.gallery img:hover {
  transform:scale(1.1);
  box-shadow:0 0 20px #fff;
}

/* POPUP */
#popup {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:2000;
}

#popup img {
  width:70%;
  border-radius:10px;
}

#popup span {
  position:absolute;
  top:20px;
  right:40px;
  font-size:40px;
  cursor:pointer;
}
</style>

</head>

<body>

<!-- LOADER -->
<div id="loader">
  <h1>Loading...</h1>
</div>

<!-- TRANSITION -->
<div id="transition"></div>

<!-- PARTICLES -->
<div id="particles-js"></div>

<!-- NAVBAR -->
<header>
<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="sermons.html">Sermons</a>
<a href="gallery.html">Gallery</a>
<a href="prayer.html">Prayer</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<!-- VIDEO -->
<video autoplay muted loop class="bg-video">
  <source src="videos/gallery.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<h1>Our Ministry Gallery</h1>

<!-- IMAGES -->
<div class="gallery">
  <img src="images/img1.jpg" onclick="openImg(this.src)">
  <img src="images/img2.jpg" onclick="openImg(this.src)">
  <img src="images/img3.jpg" onclick="openImg(this.src)">
  <img src="images/img4.jpg" onclick="openImg(this.src)">
</div>

<!-- POPUP -->
<div id="popup" onclick="closeImg()">
  <span>&times;</span>
  <img id="popupImg">
</div>

<!-- JS -->
<script>
/* LOADER */
window.addEventListener("load", function(){
  document.getElementById("loader").style.display = "none";
});

/* TRANSITION */
document.querySelectorAll("a").forEach(link => {
  link.addEventListener("click", function(e){
    if(this.href.includes(".html")){
      e.preventDefault();
      document.getElementById("transition").style.transform = "scaleY(1)";
      setTimeout(()=>{
        window.location = this.href;
      },500);
    }
  });
});

/* PARTICLES */
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    size: { value: 3 },
    move: { speed: 2 }
  }
});

/* IMAGE POPUP */
function openImg(src){
  document.getElementById("popup").style.display="flex";
  document.getElementById("popupImg").src=src;
}

function closeImg(){
  document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
