<!DOCTYPE html>

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  color:white;
}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(0,0,0,0.7);
  padding:15px;
  text-align:center;
  z-index:1000;
}

.navbar a{
  color:white;
  margin:0 15px;
  text-decoration:none;
  font-size:18px;
}

/* VIDEO */
.bg-video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  z-index:-1;
}

/* CONTAINER */
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  padding-top:80px;
}

/* BOX */
.box{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(18px);
  padding:40px;
  border-radius:20px;
  text-align:center;
  width:350px;
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

/* 🔥 3D BUTTONS */
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin:15px 0;
  padding:18px;
  border-radius:14px;
  color:white;
  text-decoration:none;
  font-size:20px;
  font-weight:800;

  box-shadow:
    0 12px 0 rgba(0,0,0,0.3),
    0 20px 30px rgba(0,0,0,0.5),
    inset 0 2px 0 rgba(255,255,255,0.4),
    inset 0 -4px 0 rgba(0,0,0,0.2);

  transition:0.25s;
}

/* HOVER EFFECT */
.btn:hover{
  transform:translateY(-8px) scale(1.03);
  box-shadow:
    0 22px 0 rgba(0,0,0,0.25),
    0 35px 45px rgba(0,0,0,0.6),
    0 0 25px rgba(255,255,255,0.25);
}

/* CLICK EFFECT */
.btn:active{
  transform:translateY(5px);
  box-shadow:
    0 5px 0 rgba(0,0,0,0.4),
    0 10px 20px rgba(0,0,0,0.5);
}

/* COLORS */
.call{
  background:linear-gradient(145deg,#1a8cff,#0057e7);
}

.whatsapp{
  background:linear-gradient(145deg,#36ff77,#00b83f);
}

.email{
  background:linear-gradient(145deg,#ff6a3d,#ff2d00);
}

/* TEXT */
h2{
  margin-bottom:10px;
}

h3{
  margin-top:25px;
}

p{
  margin:5px 0;
}

/* MAP */
iframe{
  width:100%;
  height:150px;
  border:none;
  margin-top:15px;
  border-radius:10px;
}

/* MOBILE */
@media(max-width:480px){
  .box{
    width:90%;
    padding:25px;
  }

  .btn{
    font-size:18px;
    padding:16px;
  }
}
</style>

</head>

<body>

  </nav>

<div class="overlay"></div>

<div class="container">

    <p>+91 7724953676</p>

    <p>thegodspowerministry@email.com</p>

    <!-- 🔥 3D BUTTONS -->
    <a href="tel:+917724953676" class="btn call">📞 Call Now</a>

    <a href="https://wa.me/917724953676" target="_blank" class="btn whatsapp">💬 WhatsApp</a>

</div>

</html>
